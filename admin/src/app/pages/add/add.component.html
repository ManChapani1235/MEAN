<div class="add-container">
  <h2>Add New Product</h2>
  <p class="message">{{ message }}</p>
  <input type="text" [(ngModel)]="product.name" placeholder="Name" />
  <textarea [(ngModel)]="product.description" placeholder="Description"></textarea>

  <select [(ngModel)]="product.category">
    <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
  </select>

  <input type="number" [(ngModel)]="product.price" placeholder="Price" />
  <input type="file" (change)="handleImage($event)" />

  <button (click)="submit()">Add Product</button>
</div>
