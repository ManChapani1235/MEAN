<app-navbar></app-navbar>
<h2>Cart</h2>
<table>
  <thead>
    <tr>
      <th>Items</th>
      <th>Title</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Total</th>
      <th>Remove</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of cartItems">
      <td><img [src]="getImageUrl(item.image)" width="50" /></td>
      <td>{{ item.name }}</td>
      <td>₹{{ item.price }}</td>
      <td>{{ item.quantity }}</td>
      <td>₹{{ item.price * item.quantity }}</td>
      <td><button (click)="removeItem(item._id)">x</button></td>
    </tr>
  </tbody>
</table>

<div class="cart-summary">
  <h3>Cart Totals</h3>
  <p>Subtotal: ₹{{ getSubtotal() }}</p>
  <p>Delivery Fee: ₹2</p>
  <p><strong>Total: ₹{{ getTotal()  }}</strong></p>

  <div class="promo">
    <input type="text" placeholder="promo code" [(ngModel)]="promoCode" />
    <button>Submit</button>
  </div>

  <button class="pay-btn" (click)="submitOrder()">PROCEED TO PAYMENT</button>


</div>
